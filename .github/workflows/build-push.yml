name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: read

jobs:
  build:
    runs-on: home-k8s

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        run: |
          git fetch --tags
          LATEST=$(git tag --sort=-v:refname | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)
          if [ -z "$LATEST" ]; then
            NEW_TAG="0.1.0"
          else
            IFS='.' read -ra PARTS <<< "$LATEST"
            NEW_TAG="${PARTS[0]}.${PARTS[1]}.$((PARTS[2] + 1))"
          fi
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: registry.makepeace.cc/scouts-site
          tags: |
            type=raw,value=${{ steps.tag.outputs.new_tag }}
            type=raw,value=latest

      - name: Generate gallery manifest
        run: |
          python3 - <<'EOF'
          import os, json
          manifest = {}
          for section in ['beavers', 'cubs', 'scouts']:
              if os.path.isdir(section):
                  manifest[section] = sorted([
                      f for f in os.listdir(section)
                      if f.lower().endswith(('.jpg', '.jpeg', '.png', '.webp'))
                  ])
              else:
                  manifest[section] = []
          with open('gallery-manifest.json', 'w') as fh:
              json.dump(manifest, fh)
          print('Gallery manifest:', manifest)
          EOF

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to private registry
        run: echo "$REGISTRY_PASSWORD" | docker login registry.makepeace.cc --username "$REGISTRY_USERNAME" --password-stdin

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false

      - name: Summary
        run: |
          echo "## Docker image pushed" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Bump argo deployment
        run: |
          if [ -z "${GH_PAT:-}" ]; then
            echo "GH_PAT not available yet — skipping argo bump"
            exit 0
          fi
          git clone "https://x-access-token:${GH_PAT}@github.com/jmakepeace/argo.git" /tmp/argo
          cd /tmp/argo
          sed -i "s|registry.makepeace.cc/scouts-site:[^[:space:]]*|registry.makepeace.cc/scouts-site:${{ steps.tag.outputs.new_tag }}|" Deployments/scouts/scouts-site-deployment.yaml
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Deployments/scouts/scouts-site-deployment.yaml
          git commit -m "Bump scouts-site to ${{ steps.tag.outputs.new_tag }}"
          git pull --rebase
          git push
