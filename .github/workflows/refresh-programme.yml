name: Refresh OSM programme

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  refresh:
    runs-on: home-k8s

    steps:
      - uses: actions/checkout@v7.0.0

      - name: Fetch OSM programme
        run: python3 fetch_programme.py

      - name: Commit if changed
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          if git diff --quiet program.json; then
            echo "No changes to program.json"
          else
            git add program.json
            git commit -m "chore: refresh OSM programme data"
            # Push with the PAT when available so the push triggers build-push.
            # If it is not configured, dispatch build-push explicitly after
            # the default-token push because that push will not trigger builds.
            if [ -n "${GH_PAT:-}" ]; then
              git push "https://x-access-token:${GH_PAT}@github.com/jmakepeace/1st-hartshorne-scouts-site.git" HEAD:main
            else
              echo "GH_PAT not set - pushing with default token and dispatching build workflow"
              git push
              curl --fail --silent --show-error \
                -X POST \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                https://api.github.com/repos/jmakepeace/1st-hartshorne-scouts-site/actions/workflows/build-push.yml/dispatches \
                -d '{"ref":"main"}'
            fi
          fi
