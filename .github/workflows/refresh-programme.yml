name: Refresh OSM programme

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  refresh:
    runs-on: home-k8s

    steps:
      - uses: actions/checkout@v7.0.1
        with:
          fetch-depth: 0

      - name: Fetch OSM programme
        run: python3 fetch_programme.py

      - name: Commit if changed
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          if git diff --quiet program.json; then
            echo "No changes to program.json"
            exit 0
          fi
          git add program.json
          git commit -m "chore: refresh OSM programme data"

          # Choose the push remote. Prefer the PAT so the push triggers
          # build-push; fall back to the default token otherwise.
          if [ -n "${GH_PAT:-}" ]; then
            push_remote="https://x-access-token:${GH_PAT}@github.com/jmakepeace/1st-hartshorne-scouts-site.git"
          else
            echo "GH_PAT not set - pushing with default token and dispatching build workflow"
            push_remote="origin"
          fi

          # The remote main can move between checkout and push (concurrent
          # runs or the build-push workflow). Rebase our single commit onto
          # the latest main and retry the push if we lose the race.
          pushed=false
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git rebase origin/main || { git rebase --abort; echo "rebase failed"; exit 1; }
            if git push "$push_remote" HEAD:main; then
              pushed=true
              break
            fi
            echo "Push attempt $attempt rejected, retrying after rebase..."
            sleep $((attempt * 2))
          done
          if [ "$pushed" != true ]; then
            echo "Failed to push after multiple attempts"
            exit 1
          fi

          # The default token push does not trigger other workflows, so
          # dispatch build-push explicitly in that case.
          if [ -z "${GH_PAT:-}" ]; then
            curl --fail --silent --show-error \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/jmakepeace/1st-hartshorne-scouts-site/actions/workflows/build-push.yml/dispatches \
              -d '{"ref":"main"}'
          fi
