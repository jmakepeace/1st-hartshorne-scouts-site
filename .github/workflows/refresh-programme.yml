name: Refresh OSM programme

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: home-k8s

    steps:
      - uses: actions/checkout@v7.0.0

      - name: Fetch OSM programme
        run: python3 fetch_programme.py

      - name: Commit if changed
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          if git diff --quiet program.json; then
            echo "No changes to program.json"
          else
            git add program.json
            git commit -m "chore: refresh OSM programme data"
            # Push with the PAT (not the default GITHUB_TOKEN) so the commit
            # triggers the build-push workflow. GITHUB_TOKEN pushes do not.
            if [ -n "${GH_PAT:-}" ]; then
              git push "https://x-access-token:${GH_PAT}@github.com/jmakepeace/1st-hartshorne-scouts-site.git" HEAD:main
            else
              echo "GH_PAT not set — pushing with default token (will NOT trigger build)"
              git push
            fi
          fi
